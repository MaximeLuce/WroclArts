server.servlet.context-path=/WroclArts
spring.application.name=WroclArts

# APPLICATION PROPERTIES COMING FROM UNIVERSITYSERVICE01
spring.mvc.format.date-time=iso
# database settings

# in-memory:
# spring.datasource.url=jdbc:h2:mem:testdb
# current working directory:
spring.datasource.url=jdbc:h2:file:./demodb
#  http://localhost:8080/universityService01/h2-ui
# jdbculr jdbc:h2:file:./demodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
#spring.jpa.hibernate.ddl-auto=create
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode = never

spring.h2.console.enabled=true
# default path: h2-console
spring.h2.console.path=/h2-ui


