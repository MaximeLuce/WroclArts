      </div>
      <h1>WrocłArts</h1>
    </div>
  </a>

  <nav class="nav-links">
    <a routerLink="/"
       routerLinkActive="active"
       [routerLinkActiveOptions]="{exact: true}"
       class="nav-btn">

    <a routerLink="/registerevent"
       routerLinkActive="active"

  <div class="user-actions">
